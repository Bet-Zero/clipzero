services:
  - type: web
    name: clipzero-api
    env: node
    plan: starter
    rootDir: .
    autoDeploy: false
    buildCommand: npm ci && npm run build:api
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: CLIPZERO_ALLOWED_ORIGINS
        value: https://clipzero-web.onrender.com
      - key: CLIPZERO_CACHE_DIR
        value: /var/data/clipzero-cache
      - key: CLIPZERO_DISABLE_ACCESS
        value: "0"
      - key: CLIPZERO_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: CLIPZERO_RATE_LIMIT_MAX
        value: "120"
      - key: CLIPZERO_HEAVY_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: CLIPZERO_HEAVY_RATE_LIMIT_MAX
        value: "40"
      - key: CLIPZERO_PLAYERS_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: CLIPZERO_PLAYERS_RATE_LIMIT_MAX
        value: "60"

  - type: web
    name: clipzero-web
    env: node
    plan: starter
    rootDir: .
    autoDeploy: false
    buildCommand: npm ci && npm run build:web
    startCommand: npm run start:web
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://clipzero-api.onrender.com
      - key: CLIPZERO_APP_PASSWORD
        value: change-me-before-launch
      - key: CLIPZERO_ACCESS_TOKEN
        value: replace-with-a-random-32-plus-char-token
      - key: CLIPZERO_DISABLE_ACCESS
        value: "0"
